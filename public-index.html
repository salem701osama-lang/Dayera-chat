<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>دايرة - مراسلة سالم حجاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:tahoma;background:#0e1621;color:#fff;height:100vh;overflow:hidden}

/* واجهة الدخول */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#17212b 0%,#0e1621 100%);padding:20px}
.logo{font-size:48px;margin-bottom:10px}
#loginScreen h1{font-size:24px;color:#6ab7ff;margin-bottom:5px}
#loginScreen.subtitle{font-size:12px;color:#7d8b99;margin-bottom:30px;text-align:center;line-height:1.6}
#loginScreen input{width:100%;max-width:300px;padding:12px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:12px;font-size:15px;margin-bottom:12px;text-align:center}
#loginScreen button{width:100%;max-width:300px;padding:12px;border:none;background:#5288c4;color:#fff;border-radius:12px;font-weight:bold;cursor:pointer;font-size:15px}
.disclaimer{font-size:10px;color:#555;margin-top:20px;text-align:center;line-height:1.5}

/* الشات */
#chatScreen{display:none;flex-direction:column;height:100vh}
.header{background:#17212b;padding:12px 15px;text-align:center;border-bottom:1px solid #0e1621;position:relative}
.header h1{font-size:16px;font-weight:bold;color:#6ab7ff}
.header p{font-size:10px;color:#7d8b99;margin-top:2px}
.exitBtn{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:#e74c3c;border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer}

#msgs{flex:1;overflow-y:auto;padding:10px;background:#0e1621;display:flex;flex-direction:column}
.msg{margin:6px 0;display:flex;flex-direction:column;max-width:75%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg div{background:#182533;padding:8px 12px;border-radius:12px;font-size:14px;word-wrap:break-word;line-height:1.4}
.msg.me div{background:#2b5278;border-bottom-right-radius:3px}
.msg.other div{border-bottom-left-radius:3px}
.msg img{max-width:200px;border-radius:8px;margin-top:5px;cursor:pointer}
.msg small{font-size:10px;color:#7d8b99;margin-top:3px}
.system{text-align:center;color:#7d8b99;font-size:12px;margin:10px 0}

#inputArea{display:flex;align-items:center;background:#17212b;padding:8px;border-top:1px solid #0e1621;gap:8px}
#msg{flex:1;padding:10px 15px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:20px;font-size:14px}
.imgBtn{padding:10px 12px;border:none;background:#242f3d;color:#fff;border-radius:50%;cursor:pointer;font-size:18px}
button.send{padding:10px 16px;border:none;background:#5288c4;color:#fff;border-radius:20px;font-weight:bold;cursor:pointer;font-size:14px}
input[type=file]{display:none}
</style>
</head>
<body>

<!-- واجهة الدخول -->
<div id="loginScreen">
  <div class="logo">💬</div>
  <h1>دايرة</h1>
  <div class="subtitle">برنامج مراسلة فوري<br>برمجة وتصميم: الباشمهندس سالم حجاج</div>
  <input id="name" placeholder="اكتب الاسم اللي هتظهر بيه">
  <button onclick="joinChat()">دخول الشات</button>
  <div class="disclaimer">
    برنامج مراسلة يخص الباشمهندس سالم حجاج<br>
    غير تابع لأي جهة ولا له أي صلة بأي برامج تواصل أخرى
  </div>
</div>

<!-- شاشة الشات -->
<div id="chatScreen">
  <div class="header">
    <button class="exitBtn" onclick="exitChat()">خروج</button>
    <h1>دايرة شات</h1>
    <p>برمجة: سالم حجاج © 2026</p>
  </div>

  <div id="msgs">
    <div class="system">نورت الشات 🔥</div>
  </div>

  <div id="inputArea">
    <label class="imgBtn" for="imgInput">📷</label>
    <input type="file" id="imgInput" accept="image/*">
    <input id="msg" placeholder="اكتب رسالة...">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const msgs = document.getElementById('msgs');
const nameInput = document.getElementById('name');
const msgInput = document.getElementById('msg');
const imgInput = document.getElementById('imgInput');
let myName = '';
let myId = '';

function joinChat(){
  myName = nameInput.value.trim();
  if(!myName) return alert('اكتب اسمك الأول');

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';

  socket.emit('join', myName);
  msgInput.focus();
}

function exitChat(){
  location.reload();
}

function send(){
  const m = msgInput.value.trim();
  if(m) {
    socket.emit('chat', {text: m, img: null});
    msgInput.value = '';
  }
}

msgInput.addEventListener('keypress', e => { if(e.key==='Enter') send() });

// رفع الصور
imgInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    socket.emit('chat', {text: '', img: event.target.result});
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

socket.on('connect', () => { myId = socket.id });

// استقبال تاريخ الشات القديم
socket.on('chatHistory', (history) => {
  history.forEach(d => {
    if(d.user === 'النظام') {
      msgs.innerHTML += '<div class="system">' + d.user + ': ' + d.text + '</div>';
    } else {
      const isMe = d.id === myId;
      const imgHtml = d.img? '<br><img src="' + d.img + '" onclick="window.open(this.src)">' : '';
      msgs.innerHTML += '<div class="msg ' + (isMe? 'me' : 'other') + '"><div><b>' + d.user + '</b><br>' + d.text + imgHtml + '</div><small>' + d.time + '</small></div>';
    }
  });
  msgs.scrollTop = msgs.scrollHeight;
});

// استقبال الرسايل الجديدة
socket.on('chat', d => {
  if(d.user === 'النظام') {
    msgs.innerHTML += '<div class="system">' + d.user + ': ' + d.text + '</div>';
  } else {
    const isMe = d.id === myId;
    const imgHtml = d.img? '<br><img src="' + d.img + '" onclick="window.open(this.src)">' : '';
    msgs.innerHTML += '<div class="msg ' + (isMe? 'me' : 'other') + '"><div><b>' + d.user + '</b><br>' + d.text + imgHtml + '</div><small>' + d.time + '</small></div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
});
</script>
</body>
</html>

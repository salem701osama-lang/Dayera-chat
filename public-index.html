<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>دايرة شات</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:tahoma;background:#0e1621;color:#fff;height:100vh;display:flex;flex-direction:column}
.header{background:#17212b;padding:12px 15px;text-align:center;border-bottom:1px solid #0e1621}
.header h1{font-size:16px;font-weight:bold;color:#6ab7ff}
.header p{font-size:11px;color:#7d8b99;margin-top:3px}
#msgs{flex:1;overflow-y:auto;padding:10px;background:#0e1621}
.msg{margin:6px 0;display:flex;flex-direction:column;max-width:75%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg div{background:#182533;padding:8px 12px;border-radius:12px;font-size:14px;word-wrap:break-word;line-height:1.4}
.msg.me div{background:#2b5278;border-bottom-right-radius:3px}
.msg.other div{border-bottom-left-radius:3px}
.msg small{font-size:10px;color:#7d8b99;margin-top:3px}
#inputArea{display:flex;background:#17212b;padding:8px;border-top:1px solid #0e1621}
#name{width:100%;padding:10px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:20px;font-size:14px;margin-bottom:8px}
#msg{flex:1;padding:10px 15px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:20px;font-size:14px;margin-left:8px}
button{padding:10px 16px;border:none;background:#5288c4;color:#fff;border-radius:20px;font-weight:bold;cursor:pointer;font-size:14px}
.system{text-align:center;color:#7d8b99;font-size:12px;margin:10px 0}
</style>
</head>
<body>
<div class="header">
  <h1>دايرة شات</h1>
  <p>برمجة وتصميم: سالم حجاج © 2026</p>
</div>

<div id="msgs">
  <div class="system">اكتب اسمك تحت واضغط Enter عشان تدخل 🔥</div>
</div>

<div style="padding:10px;background:#17212b">
  <input id="name" placeholder="اكتب اسمك واضغط Enter">
  <div id="inputArea">
    <input id="msg" placeholder="اكتب رسالة..." disabled>
    <button onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const msgs = document.getElementById('msgs');
const nameInput = document.getElementById('name');
const msgInput = document.getElementById('msg');
let myName = '';
let myId = '';

function send(){
  if(!myName) {
    myName = nameInput.value.trim();
    if(myName) {
      socket.emit('join', myName);
      nameInput.disabled = true;
      nameInput.style.display = 'none';
      msgInput.disabled = false;
      msgInput.focus();
      msgs.innerHTML += '<div class="system">أهلاً ' + myName + ' نورت الدردشة 🎉</div>';
    }
  } else {
    const m = msgInput.value.trim();
    if(m) {
      socket.emit('chat', m);
      msgInput.value = '';
    }
  }
}

nameInput.addEventListener('keypress', e => { if(e.key==='Enter') send() });
msgInput.addEventListener('keypress', e => { if(e.key==='Enter') send() });

socket.on('connect', () => { myId = socket.id });

socket.on('chat', d => {
  if(d.user === 'النظام') {
    msgs.innerHTML += '<div class="system">' + d.user + ': ' + d.text + '</div>';
  } else {
    const isMe = d.id === myId;
    msgs.innerHTML += '<div class="msg ' + (isMe ? 'me' : 'other') + '"><div><b>' + d.user + '</b><br>' + d.text + '</div><small>' + d.time + '</small></div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
});
</script>
</body>
</html>

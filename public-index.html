<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>دايرة شات</title>
  
  <!-- PWA Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5288c4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  
  <!-- CSS بتاعك هنا -->
</head>
<body>
  <!-- HTML بتاعك هنا -->
  
  <!-- Service Worker + Microphone Permission -->
  <script>
    // تسجيل Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('✅ SW registered'))
        .catch(err => console.log('❌ SW error:', err));
      });
    }
    
    // طلب صلاحية المايك أول ما المستخدم يدوس ريكورد
    async function requestMicPermission() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log('✅ Microphone permission granted');
        stream.getTracks().forEach(track => track.stop()); // اقفل المايك بعد الاختبار
        return true;
      } catch (err) {
        console.error('❌ Microphone permission denied:', err);
        alert('لازم توافق على المايك عشان تسجل ريكورد');
        return false;
      }
    }
    
    // نادي الفنكشن دي قبل ما تبدأ تسجل
    // مثال: document.getElementById('recordBtn').onclick = requestMicPermission;
  </script>
</body>
</html>

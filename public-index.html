<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دايرة شات - سالم حجاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:TahSegoe}
body{background:#0a0e13;color:#fff;height:100vh;overflow:hidden}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1a2332 0%,#0a0e13 100%);padding:20px}
.banner{text-align:center;margin-bottom:30px;padding:20px;background:linear-gradient(135deg,#2b5278,#1e3a5f);border-radius:20px;box-shadow:0 8px 25px rgba(43,82,120,.4)}
.banner h1{font-size:32px;color:#fff;letter-spacing:2px}
.badge{background:#ff6b35;color:#fff;padding:4px 12px;border-radius:15px;font-size:11px;font-weight:bold}
#loginScreen input{width:100%;max-width:300px;padding:12px;border:2px solid #2b5278;background:#1a2332;color:#fff;border-radius:10px;text-align:center;margin-bottom:12px}
#loginScreen button{width:100%;max-width:300px;padding:12px;border:none;background:linear-gradient(135deg,#5288c4,#3a6ea5);color:#fff;border-radius:10px;font-weight:bold;cursor:pointer}
.footer-text{font-size:10px;color:#555;margin-top:25px;text-align:center}
#chatScreen{display:none;flex-direction:column;height:100vh}
.header{background:linear-gradient(90deg,#1a2332,#2b5278,#1a2332);padding:12px;text-align:center;border-bottom:2px solid #000;position:relative}
.header h1{font-size:17px;color:#fff}
.header p{font-size:10px;color:#aaa}
.exitBtn{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:#e74c3c;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer}
#msgs{flex:1;overflow-y:auto;padding:12px;background:linear-gradient(180deg,#0a0e13 0%,#131b25 100%);display:flex;flex-direction:column}
.msg{margin:6px 0;display:flex;flex-direction:column;max-width:70%;animation:up.3s}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
.msg.me{align-self:flex-end}
.msg.other{align-self:flex-start}
.msg-bubble{background:#1a2332;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;position:relative;border:1px solid #2b5278}
.msg.me.msg-bubble{background:linear-gradient(135deg,#2b5278,#1e4a70);border-bottom-right-radius:4px}
.msg.other.msg-bubble{border-bottom-left-radius:4px}
.msg img{max-width:200px;border-radius:8px;margin-top:5px;border:2px solid #2b5278}
.msg audio{max-width:200px;margin-top:5px}
.msg small{font-size:9px;color:#8a9ba8;margin-top:3px}
.deleteBtn{position:absolute;top:-6px;left:-6px;background:#e74c3c;border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:none}
.msg.me:hover.deleteBtn{display:block}
.system{text-align:center;color:#8a9ba8;font-size:11px;margin:8px 0;padding:6px 12px;background:#1a2332;border-radius:15px;align-self:center}
#inputArea{display:flex;align-items:center;background:#1a2332;padding:8px;border-top:2px solid #000;gap:6px}
#msg{flex:1;padding:10px 14px;border:2px solid #2b5278;background:#0a0e13;color:#fff;border-radius:20px;font-size:13px}
#msg:focus{border-color:#5288c4}
.actionBtn{padding:10px 12px;border:none;background:#2b5278;color:#fff;border-radius:50%;cursor:pointer;font-size:18px;min-width:40px}
.actionBtn.recording{background:#e74c3c;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.sendBtn{padding:8px 14px;border:none;background:linear-gradient(135deg,#5288c4,#3a6ea5);color:#fff;border-radius:18px;font-weight:bold;cursor:pointer;font-size:12px}
input[type=file]{display:none}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="banner"><h1>دايرة شات</h1><span class="badge">خاص</span></div>
  <p style="color:#8a9ba8;margin:15px 0;font-size:12px">من برمجة سالم حجاج</p>
  <input id="name" placeholder="اكتب اسمك">
  <button onclick="join()">دخول الشات</button>
  <div class="footer-text">جميع الحقوق محفوظة © 2026<br>برنامج مراسلة يخص سالم حجاج</div>
</div>

<div id="chatScreen">
  <div class="header">
    <button class="exitBtn" onclick="location.reload()">خروج</button>
    <h1>دايرة شات</h1>
    <p>من برمجة سالم حجاج © 2026</p>
  </div>
  <div id="msgs"></div>
  <div id="inputArea">
    <label class="actionBtn" for="img">📷</label>
    <input type="file" id="img" accept="image/*">
    <button class="actionBtn" id="mic" onclick="rec()">🎤</button>
    <input id="msg" placeholder="اكتب...">
    <button class="sendBtn" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io(),msgs=document.getElementById('msgs'),name=document.getElementById('name'),msg=document.getElementById('msg'),img=document.getElementById('img'),mic=document.getElementById('mic');
let myId='',recorder,chunks=[];

function join(){if(!name.value.trim())return alert('اكتب اسمك');document.getElementById('loginScreen').style.display='none';document.getElementById('chatScreen').style.display='flex';socket.emit('join',name.value.trim());msg.focus()}
function send(){if(msg.value.trim()){socket.emit('chat',{text:msg.value});msg.value=''}}

msg.onkeypress=e=>{if(e.key==='Enter')send()}
img.onchange=e=>{const f=e.target.files[0];if(f&&f.size<8*1024*1024){const r=new FileReader();r.onload=()=>socket.emit('chat',{img:r.result});r.readAsDataURL(f)}e.target.value=''}

async function rec(){
  if(!recorder||recorder.state==='inactive'){
    const stream=await navigator.mediaDevices.getUserMedia({audio:1});
    recorder=new MediaRecorder(stream);
    chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{const r=new FileReader();r.onload=()=>socket.emit('chat',{audio:r.result});r.readAsDataURL(new Blob(chunks))};
    recorder.start();mic.classList.add('recording');mic.innerText='⏹️'
  }else{recorder.stop();mic.classList.remove('recording');mic.innerText='🎤'}
}

function del(id){if(confirm('تمسح؟'))socket.emit('deleteMsg',id)}
socket.on('connect',()=>myId=socket.id);
function render(d){
  if(d.id==='system')return'<div class="system">'+d.text+'</div>';
  const me=d.id===myId,btn=me?'<button class="deleteBtn" onclick="del(\''+d.msgId+'\')">×</button>':'';
  return'<div class="msg '+(me?'me':'other')+'" id="m'+d.msgId+'">'+btn+'<div class="msg-bubble"><b>'+d.user+'</b><br>'+d.text+(d.img?'<br><img src="'+d.img+'">':'')+(d.audio?'<br><audio controls src="'+d.audio+'"></audio>':'')+'</div><small>'+d.time+'</small></div>'
}
socket.on('chatHistory',h=>{msgs.innerHTML='';h.forEach(d=>msgs.innerHTML+=render(d));msgs.scrollTop=msgs.scrollHeight});
socket.on('chat',d=>{msgs.innerHTML+=render(d);msgs.scrollTop=msgs.scrollHeight});
socket.on('msgDeleted',id=>{const el=document.getElementById('m'+id);if(el)el.remove()});
</script>
</body>
</html>

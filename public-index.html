<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دايرة شات Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:#0a0e17;color:#e0e0e0;height:100vh;overflow:hidden}
.hidden{display:none!important}
#lobby{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#5865f2 0%,#eb4599 100%);padding:20px}
.lobby-box{background:rgba(30,37,56,0.95);backdrop-filter:blur(20px);padding:35px;border-radius:24px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1)}
.lobby-box h1{color:#fff;margin-bottom:25px;text-align:center;font-size:28px;font-weight:700}
.lobby-box input{width:100%;padding:14px 18px;margin:10px 0;background:#131927;border:2px solid #2b3245;border-radius:12px;color:#fff;font-size:16px}
.lobby-box input:focus{outline:none;border-color:#5865f2}
.lobby-box button{width:100%;padding:14px;margin-top:15px;background:#5865f2;border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;font-size:17px}
.lobby-box button:hover{background:#4752c4}
.note{font-size:12px;color:#96989d;text-align:center;margin-top:15px}
#chatApp{height:100vh;display:flex;flex-direction:column}
.header{background:#1e2538;padding:15px 20px;display:flex;justify-content:space-between;border-bottom:2px solid #2b3245}
.messages{flex:1;overflow-y:auto;padding:20px;background:#131927}
.msg{margin:12px 0;display:flex}
.msg.me{justify-content:flex-end}
.msg-bubble{max-width:65%;padding:12px 16px;border-radius:18px;background:#1e2538}
.msg.me.msg-bubble{background:#5865f2;border-bottom-right-radius:4px}
.msg.other.msg-bubble{border-bottom-left-radius:4px}
.msg-name{font-size:12px;color:#faa61a;margin-bottom:5px;font-weight:600}
.msg.me.msg-name{color:#fff}
.msg-time{font-size:11px;color:#96989d;margin-top:6px;text-align:left}
.system-msg{text-align:center;color:#96989d;font-size:13px;margin:15px 0;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px}
.input-bar{background:#1e2538;padding:15px;display:flex;gap:10px;border-top:2px solid #2b3245}
.input-bar input{flex:1;padding:14px 20px;background:#131927;border:2px solid #2b3245;border-radius:25px;color:#fff;font-size:16px}
.btn-primary{padding:14px 24px;background:#5865f2;border:none;border-radius:25px;color:#fff;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#4752c4}
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-box">
    <h1>🔥 دايرة شات Pro</h1>
    <input id="username" placeholder="اسمك المستعار" maxlength="20">
    <input id="roomName" placeholder="اسم الغرفة - اكتب أي اسم">
    <button onclick="joinRoom()">دخول الغرفة</button>
    <p class="note">مفيش باسوردات خلاص - أي اسم غرفة بتتعمل فوراً</p>
  </div>
</div>

<div id="chatApp" class="hidden">
  <div class="header">
    <h2 id="currentRoom">الغرفة</h2>
    <button onclick="location.reload()" style="background:#ed4245;border:none;padding:8px 16px;border-radius:8px;color:#fff;cursor:pointer">خروج</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="sendImg()">
    <button onclick="document.getElementById('imgInput').click()" style="padding:14px;background:#131927;border:none;border-radius:25px;color:#fff">📷</button>
    <input id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button class="btn-primary" onclick="sendMsg()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentUser = '', currentRoom = '';

function joinRoom() {
  const username = document.getElementById('username').value.trim();
  const room = document.getElementById('roomName').value.trim();
  if(!username ||!room) return alert('اكتب اسمك واسم الغرفة');
  currentUser = username;
  socket.emit('joinRoom', {username, room});
}

socket.on('joined', ({room, messages}) => {
  currentRoom = room;
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('chatApp').classList.remove('hidden');
  document.getElementById('currentRoom').textContent = 'غرفة: ' + room;
  document.getElementById('messages').innerHTML = '';
  messages.forEach(m => addMessage(m));
});

function sendMsg() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if(!msg) return;
  socket.emit('chatMessage', {msg});
  input.value = '';
}

function sendImg() {
  const file = document.getElementById('imgInput').files[0];
  if(!file) return;
  if(file.size > 8*1024*1024) return alert('الصورة أكبر من 8 ميجا');
  const reader = new FileReader();
  reader.onload = e => socket.emit('chatMessage', {img: e.target.result});
  reader.readAsDataURL(file);
}

function addMessage(m) {
  const div = document.createElement('div');
  div.className = 'msg ' + (m.username === currentUser? 'me' : 'other');
  div.innerHTML = `
    <div class="msg-bubble" id="msg-${m.id}">
      ${m.username!== currentUser? `<div class="msg-name">${m.username}</div>` : ''}
      ${m.msg? `<div>${m.msg}</div>` : ''}
      ${m.img? `<br><img src="${m.img}" style="max-width:200px;border-radius:10px;margin-top:5px" onclick="window.open(this.src)">` : ''}
      <div class="msg-time">${m.time}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

socket.on('message', addMessage);
socket.on('msgDeleted', id => {
  const el = document.getElementById('msg-' + id);
  if(el) el.innerHTML = '<i style="color:#96989d">رسالة محذوفة</i>';
});
socket.on('system', msg => {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = msg;
  document.getElementById('messages').appendChild(div);
});
socket.on('error', alert);
socket.on('kicked', msg => { alert(msg); location.reload(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>برنامج دايرة شات - مهندس سالم حجاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma}
body{background:#0b141a;color:#e9edef;height:100vh;overflow:hidden;user-select:none}

#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0b141a;padding:20px}
.login-logo{width:90px;height:90px;background:linear-gradient(135deg,#00a884,#128c7e);border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:45px;margin-bottom:30px;box-shadow:0 10px 40px rgba(0,168,132,.5)}
.login-title{font-size:30px;color:#e9edef;margin-bottom:8px;font-weight:300}
.login-sub{font-size:14px;color:#8696a0;margin-bottom:45px}
#loginScreen input{width:100%;max-width:360px;padding:16px;border:none;border-bottom:2px solid #2a3942;background:transparent;color:#e9edef;text-align:center;margin-bottom:25px;font-size:17px}
#loginScreen input:focus{border-bottom-color:#00a884;outline:none}
#loginScreen button{width:100%;max-width:360px;padding:15px;border:none;background:#00a884;color:#fff;border-radius:24px;font-weight:600;cursor:pointer;font-size:16px;box-shadow:0 4px 15px rgba(0,168,132,.4)}
.footer-text{font-size:11px;color:#54656f;margin-top:45px;text-align:center}

#chatScreen{display:none;flex-direction:column;height:100vh;background:#0b141a}
.header{background:#1f2c33;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942;min-height:59px}
.backBtn{width:40px;height:40px;border-radius:50%;background:transparent;border:none;color:#e9edef;font-size:24px;cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#00a884,#128c7e);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold}
.header-info{flex:1}
.header-info h1{font-size:17px;color:#e9edef;font-weight:500}
.header-info p{font-size:13px;color:#8696a0}

#msgs{flex:1;overflow-y:auto;padding:12px 8px;background:#0b141a;background-image:radial-gradient(#1a2a32 1px, transparent 1px);background-size:30px 30px;display:flex;flex-direction:column;gap:2px}

.msg{margin:1px 0;display:flex;flex-direction:column;max-width:65%;position:relative;animation:pop.2s}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.msg.me{align-self:flex-end;margin-right:8px}
.msg.other{align-self:flex-start;margin-left:8px}
.msg-bubble{padding:8px 12px;border-radius:8px;font-size:14.2px;line-height:1.45;position:relative;word-wrap:break-word;box-shadow:0 1px.5px rgba(11,20,26,.13)}
.msg.me.msg-bubble{background:#005c4b;border-top-right-radius:0}
.msg.other.msg-bubble{background:#1f2c33;border-top-left-radius:0}
.msg-user{font-size:13px;font-weight:600;color:#00a884;margin-bottom:3px}
.msg.me.msg-user{display:none}
.replyBox{background:rgba(0,0,0,.2);border-right:3px solid #00a884;padding:6px 8px;border-radius:6px;margin-bottom:6px;font-size:12px;color:#8696a0}
.replyBox b{color:#00a884}
.msg img{max-width:250px;border-radius:8px;margin-top:4px;display:block}

.audioBox{display:flex;align-items:center;gap:8px;padding:4px 0;min-width:180px}
.audioBtn{width:32px;height:32px;border-radius:50%;background:#00a884;border:none;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.audioProgress{flex:1;height:3px;background:#2a3942;border-radius:2px}
.audioProgressBar{height:100%;background:#00a884;border-radius:2px;width:0%}
.audioTime{font-size:11px;color:#8696a0;min-width:32px;text-align:left}

.msg-info{display:flex;align-items:center;gap:4px;margin-top:4px;justify-content:flex-end}
.msg-time{font-size:11px;color:#8696a0}
.read-checks{font-size:13px;color:#8696a0}
.read-checks.read{color:#53bdeb}

.deleteBtn{position:absolute;top:-8px;left:-8px;background:#e74c3c;border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:none;z-index:10}
.msg.me:hover.deleteBtn{display:block}

.system{text-align:center;color:#8696a0;font-size:12px;margin:12px 0;padding:6px 12px;background:#1f2c33;border-radius:8px;align-self:center}

#inputArea{display:flex;flex-direction:column;background:#1f2c33}
.replying{display:none;background:#2a3942;padding:8px 12px;border-right:3px solid #00a884;font-size:12px;color:#8696a0;justify-content:space-between;align-items:center}
.replying b{color:#00a884}
.replying span{flex:1;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.replying button{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:18px}

.inputRow{display:flex;align-items:center;padding:8px;gap:8px}
#msg{flex:1;padding:12px 15px;border:none;background:#2a3942;color:#e9edef;border-radius:24px;font-size:15px}
#msg:focus{background:#333e46;outline:none}
.actionBtn{width:45px;height:45px;border:none;background:transparent;color:#8696a0;border-radius:50%;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center}
.actionBtn:hover{background:#2a3942}
.actionBtn.recording{color:#e74c3c;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.sendBtn{width:45px;height:45px;border:none;background:#00a884;color:#fff;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.sendBtn.mic{background:#00a884}
.sendBtn.send{background:#00a884}
input[type=file]{display:none}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">💬</div>
  <div class="login-title">دايرة شات</div>
  <div class="login-sub">من برمجة وتصميم المهندس سالم حجاج</div>
  <input id="name" placeholder="اكتب اسمك">
  <button onclick="join()">متابعة</button>
  <div class="footer-text">منصة مراسلة خاصة<br>© 2026 المهندس سالم حجاج</div>
</div>

<div id="chatScreen">
  <div class="header">
    <button class="backBtn" onclick="location.reload()">←</button>
    <div class="avatar">س</div>
    <div class="header-info">
      <h1>دايرة الشات</h1>
      <p>متصل الآن</p>
    </div>
  </div>
  <div id="msgs"></div>
  <div id="inputArea">
    <div class="replying" id="replyBox">
      <b>رد على</b> <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>
    <div class="inputRow">
      <label class="actionBtn" for="img">📎</label>
      <input type="file" id="img" accept="image/*">
      <input id="msg" placeholder="اكتب رسالة">
      <button class="sendBtn mic" id="sendBtn" onclick="handleSend()">🎤</button>
    </div>
  </div>
</div>

<audio id="notifSound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE" preload="auto"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io(),msgs=document.getElementById('msgs'),name=document.getElementById('name'),msg=document.getElementById('msg'),img=document.getElementById('img'),sendBtn=document.getElementById('sendBtn'),replyBox=document.getElementById('replyBox'),replyText=document.getElementById('replyText'),notifSound=document.getElementById('notifSound');
let myId='',myUserId='',recorder,chunks=[],replyTo=null,playingAudio=null;

async function requestPerms(){
  if('Notification' in window && Notification.permission==='default') await Notification.requestPermission();
  try{await navigator.mediaDevices.getUserMedia({audio:1})}catch(e){}
}

function join(){
  if(!name.value.trim())return alert('اكتب اسمك');
  requestPerms();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('chatScreen').style.display='flex';
  socket.emit('join',name.value.trim());
  msg.focus()
}

// زرار واحد: لو في كلام يبقى إرسال، لو فاضي يبقى مايك
msg.oninput=()=>{
  if(msg.value.trim()){
    sendBtn.className='sendBtn send';
    sendBtn.innerHTML='➤';
  }else{
    sendBtn.className='sendBtn mic';
    sendBtn.innerHTML='🎤';
  }
}

function handleSend(){
  if(msg.value.trim()){
    send();
  }else{
    rec();
  }
}

function send(){
  if(msg.value.trim()){
    socket.emit('chat',{text:msg.value,replyTo:replyTo});
    msg.value='';cancelReply();
    sendBtn.className='sendBtn mic';
    sendBtn.innerHTML='🎤';
  }
}
function cancelReply(){replyTo=null;replyBox.style.display='none'}

msg.onkeypress=e=>{if(e.key==='Enter')send()}

img.onchange=e=>{
  const f=e.target.files[0];
  if(f&&f.size<10*1024*1024){
    const r=new FileReader();
    r.onload=()=>{
      const i=new Image();
      i.onload=()=>{
        const c=document.createElement('canvas');
        const max=800;let w=i.width,h=i.height;
        if(w>h){if(w>max){h*=max/w;w=max}}else{if(h>max){w*=max/h;h=max}}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(i,0,0,w,h);
        socket.emit('chat',{img:c.toDataURL('image/jpeg',0.7),replyTo:replyTo});
        cancelReply()
      };
      i.src=r.result
    };
    r.readAsDataURL(f)
  }
  e.target.value=''
}

async function rec(){
  if(!recorder||recorder.state==='inactive'){
    const stream=await navigator.mediaDevices.getUserMedia({audio:1});
    const mime=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'audio/webm';
    recorder=new MediaRecorder(stream,{mimeType:mime});
    chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{const r=new FileReader();r.onload=()=>socket.emit('chat',{audio:r.result,replyTo:replyTo});r.readAsDataURL(new Blob(chunks,{type:mime}));cancelReply()};
    recorder.start();sendBtn.classList.add('recording');sendBtn.innerHTML='⏹️'
  }else{recorder.stop();sendBtn.classList.remove('recording');sendBtn.innerHTML='🎤'}
}

let touchTimer;
function doReply(id,user,text){
  replyTo=id;
  replyBox.style.display='flex';
  replyText.innerText=user+': '+(text||'وسائط');
  msg.focus();
}

function del(id){
  if(confirm('حذف الرسالة؟')) socket.emit('deleteMsg',id)
}

function playAudio(audioId){
  const audio=document.getElementById(audioId);
  const btn=document.querySelector('[data-audio="'+audioId+'"]');
  const bar=document.querySelector('[data-bar="'+audioId+'"]');
  const time=document.querySelector('[data-time="'+audioId+'"]');

  if(playingAudio && playingAudio!==audio){
    playingAudio.pause();playingAudio.currentTime=0;
    document.querySelector('[data-audio="'+playingAudio.id+'"]').innerText='▶️';
  }

  if(audio.paused){
    audio.play();btn.innerText='⏸️';playingAudio=audio;
  }else{
    audio.pause();btn.innerText='▶️';playingAudio=null;
  }

  audio.ontimeupdate=()=>{
    bar.style.width=(audio.currentTime/audio.duration)*100+'%';
    time.innerText=Math.floor(audio.currentTime)+'"';
  };
  audio.onended=()=>{btn.innerText='▶️';bar.style.width='0%';time.innerText='0"';playingAudio=null};
}

socket.on('connect',()=>myId=socket.id);
socket.on('yourId',id=>myUserId=id);

let allMsgs={};
function render(d){
  if(d.userId==='system')return'<div class="system">'+d.text+'</div>';
  allMsgs[d.msgId]=d;
  const me=d.userId===myUserId;
  const replyHtml=d.replyTo&&allMsgs[d.replyTo]?'<div class="replyBox" onclick="doReply(\''+d.replyTo+'\',\''+allMsgs[d.replyTo].user+'\',`'+(allMsgs[d.replyTo].text||'وسائط').replace(/`/g,'')+'`)"><b>'+allMsgs[d.replyTo].user+'</b><br>'+(allMsgs[d.replyTo].text||'وسائط')+'</div>':'';

  let mediaHtml='';
  if(d.img) mediaHtml='<img src="'+d.img+'" onclick="window.open(this.src)">';
  if(d.audio){
    const aid='a'+d.msgId;
    mediaHtml='<div class="audioBox"><button class="audioBtn" data-audio="'+aid+'" onclick="playAudio(\''+aid+'\')">▶️</button><div class="audioProgress"><div class="audioProgressBar" data-bar="'+aid+'"></div></div><span class="audioTime" data-time="'+aid+'">0"</span><audio id="'+aid+'" src="'+d.audio+'" preload="none"></audio></div>';
  }

  const checks=me?'<span class="read-checks '+(d.read?'read':'')+'">✓</span>':'';
  const delBtn=me?'<button class="deleteBtn" onclick="del(\''+d.msgId+'\')">×</button>':'';
  const userName=!me?'<div class="msg-user">'+d.user+'</div>':'';

  return '<div class="msg '+(me?'me':'other')+'" id="m'+d.msgId+'" ontouchstart="touchTimer=setTimeout(()=>doReply(\''+d.msgId+'\',\''+d.user+'\',`'+(d.text||'').replace(/`/g,'')+'`),500)" ontouchend="clearTimeout(touchTimer)" ondblclick="doReply(\''+d.msgId+'\',\''+d.user+'\',`'+(d.text||'').replace(/`/g,'')+'`)">'+delBtn+'<div class="msg-bubble">'+replyHtml+userName+'<div>'+d.text+'</div>'+mediaHtml+'<div class="msg-info"><span class="msg-time">'+d.time+'</span>'+checks+'</div></div></div>'
}

function playNotif(){
  if(Notification.permission==='granted' && document.hidden){
    notifSound.play().catch(()=>{});
    new Notification('رسالة جديدة', {body:'وصلتك رسالة في دايرة شات'});
  }
}

socket.on('chatHistory',h=>{
  msgs.innerHTML='';allMsgs={};
  h.forEach(d=>{allMsgs[d.msgId]=d;msgs.innerHTML+=render(d)});
  msgs.scrollTop=msgs.scrollHeight
});

socket.on('chat',d=>{
  allMsgs[d.msgId]=d;
  msgs.innerHTML+=render(d);
  msgs.scrollTop=msgs.scrollHeight;
  if(d.userId!==myUserId && d.userId!=='system'){
    playNotif();
    socket.emit('markRead',d.msgId);
  }
});

socket.on('msgDeleted',id=>{
  const el=document.getElementById('m'+id);
  if(el) el.remove();
  delete allMsgs[id]
});

socket.on('msgRead',id=>{
  const el=document.querySelector('#m'+id+'.read-checks');
  if(el) el.classList.add('read')
});
</script>
</body>
</html>

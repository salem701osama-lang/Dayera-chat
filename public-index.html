<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دايرة شات</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:#0a0e13;color:#fff;height:100vh;display:flex;flex-direction:column}
#login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:20px}
#login input{padding:12px;border:2px solid #2b5278;border-radius:10px;background:#1a2332;color:#fff;width:280px;text-align:center}
#login button{padding:12px 30px;border:none;border-radius:10px;background:#5288c4;color:#fff;font-weight:bold;cursor:pointer}
#chat{display:none;flex-direction:column;height:100vh}
.header{background:#1a2332;padding:12px;text-align:center;border-bottom:2px solid #000}
.header h1{font-size:17px;color:#5288c4}
#msgs{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:75%;padding:8px 12px;border-radius:12px;background:#1a2332;font-size:14px;word-wrap:break-word}
.msg.me{align-self:flex-end;background:#2b5278}
.msg small{display:block;font-size:10px;color:#8a9ba8;margin-top:4px}
.msg img{max-width:200px;border-radius:8px;margin-top:5px}
.msg audio{max-width:200px;margin-top:5px}
.sys{text-align:center;color:#8a9ba8;font-size:12px;padding:5px}
#input{display:flex;gap:8px;padding:10px;background:#1a2332;border-top:2px solid #000}
#input input{flex:1;padding:10px;border:2px solid #2b5278;border-radius:20px;background:#0a0e13;color:#fff;outline:none}
#input button{padding:10px 15px;border:none;border-radius:50%;background:#2b5278;color:#fff;font-size:18px;cursor:pointer}
#input button.rec{background:#e74c3c}
input[type=file]{display:none}
</style>
</head>
<body>

<div id="login">
  <h1 style="color:#5288c4">دايرة شات</h1>
  <input id="name" placeholder="اكتب اسمك">
  <button onclick="join()">دخول</button>
  <p style="font-size:11px;color:#555;text-align:center">جميع الحقوق محفوظة © 2026<br>برمجة سالم حجاج</p>
</div>

<div id="chat">
  <div class="header"><h1>دايرة شات - سالم حجاج</h1></div>
  <div id="msgs"></div>
  <div id="input">
    <label for="img"><button>📷</button></label>
    <input type="file" id="img" accept="image/*">
    <button id="mic">🎤</button>
    <input id="txt" placeholder="اكتب...">
    <button onclick="send()">➤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const msgs = document.getElementById('msgs');
const txt = document.getElementById('txt');
const mic = document.getElementById('mic');
let myId = '', recorder, chunks = [], recording = false;

function join(){
  const name = document.getElementById('name').value.trim();
  if(!name) return alert('اكتب اسمك');
  document.getElementById('login').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  socket.emit('join', name);
}

function send(){
  const t = txt.value.trim();
  if(t) socket.emit('msg', {text: t});
  txt.value = '';
}

txt.addEventListener('keypress', e => {if(e.key === 'Enter') send()});

document.getElementById('img').onchange = e => {
  const f = e.target.files[0];
  if(!f) return;
  if(f.size > 5*1024*1024) return alert('الصورة كبيرة');
  const r = new FileReader();
  r.onload = () => socket.emit('msg', {img: r.result});
  r.readAsDataURL(f);
};

mic.onmousedown = mic.ontouchstart = async () => {
  if(recording) return;
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  recorder = new MediaRecorder(stream);
  chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, {type:'audio/webm'});
    const r = new FileReader();
    r.onload = () => socket.emit('msg', {audio: r.result});
    r.readAsDataURL(blob);
  };
  recorder.start();
  recording = true;
  mic.classList.add('rec');
  mic.innerText = '⏹️';
};

mic.onmouseup = mic.ontouchend = () => {
  if(!recording) return;
  recorder.stop();
  recording = false;
  mic.classList.remove('rec');
  mic.innerText = '🎤';
};

socket.on('connect', () => myId = socket.id);

function add(m){
  if(m.sys) return msgs.innerHTML += `<div class="sys">${m.sys}</div>`;
  const me = m.id === myId;
  const img = m.img? `<br><img src="${m.img}">` : '';
  const audio = m.audio? `<br><audio controls src="${m.audio}"></audio>` : '';
  msgs.innerHTML += `<div class="msg ${me?'me':''}"><b>${m.name}</b><br>${m.text||''}${img}${audio}<small>${m.time}</small></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

socket.on('history', h => h.forEach(add));
socket.on('msg', add);
</script>
</body>
</html>

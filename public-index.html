<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>برنامج دايرة شات - مهندس سالم حجاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma}
body{background:#0a0e13;color:#fff;height:100vh;overflow:hidden}

#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0a0e13 0%,#1a2332 50%,#0a0e13 100%);padding:20px}
.banner{text-align:center;margin-bottom:35px;padding:30px 40px;background:linear-gradient(135deg,#2b5278 0%,#5288c4 50%,#2b5278 100%);border-radius:25px;box-shadow:0 10px 40px rgba(82,136,196,.5);border:2px solid #5288c4}
.banner h1{font-size:34px;color:#fff;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.5);margin-bottom:8px}
.banner h2{font-size:15px;color:#ffddaa;font-weight:normal;margin-top:5px}
.badge{background:#ff6b35;color:#fff;padding:6px 20px;border-radius:20px;font-size:12px;font-weight:bold;margin-top:10px;display:inline-block}
#loginScreen input{width:100%;max-width:320px;padding:14px;border:2px solid #2b5278;background:#1a2332;color:#fff;border-radius:12px;text-align:center;margin-bottom:15px;font-size:15px;transition:.3s}
#loginScreen input:focus{border-color:#5288c4;box-shadow:0 0 15px rgba(82,136,196,.3);outline:none}
#loginScreen button{width:100%;max-width:320px;padding:14px;border:none;background:linear-gradient(135deg,#5288c4,#3a6ea5);color:#fff;border-radius:12px;font-weight:bold;cursor:pointer;font-size:15px;transition:.3s;box-shadow:0 4px 15px rgba(82,136,196,.4)}
#loginScreen button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(82,136,196,.6)}
.footer-text{font-size:10px;color:#666;margin-top:30px;text-align:center;line-height:1.8}

#chatScreen{display:none;flex-direction:column;height:100vh}
.header{background:linear-gradient(90deg,#1a2332,#2b5278,#1a2332);padding:14px;text-align:center;border-bottom:2px solid #000;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.header h1{font-size:18px;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.5)}
.header p{font-size:10px;color:#aaa;margin-top:3px}
.exitBtn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;color:#fff;padding:7px 14px;border-radius:10px;font-size:11px;cursor:pointer;font-weight:bold;transition:.2s}
.exitBtn:hover{transform:translateY(-50%) scale(1.05)}

#msgs{flex:1;overflow-y:auto;padding:15px;background:linear-gradient(180deg,#0a0e13 0%,#0f1722 100%);display:flex;flex-direction:column;gap:5px}
.msg{margin:5px 0;display:flex;flex-direction:column;max-width:72%;animation:up.3s;position:relative}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
.msg.me{align-self:flex-end}
.msg.other{align-self:flex-start}
.msg-bubble{background:#1a2332;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;position:relative;border:1px solid #2b5278;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer}
.msg.me.msg-bubble{background:linear-gradient(135deg,#2b5278,#1e4a70);border-bottom-right-radius:5px;border-color:#5288c4}
.msg.other.msg-bubble{border-bottom-left-radius:5px}
.replyBox{background:rgba(82,136,196,.2);border-right:3px solid #5288c4;padding:5px 8px;border-radius:8px;margin-bottom:5px;font-size:11px;color:#aaa}
.replyBox b{color:#5288c4}
.msg img{max-width:220px;border-radius:10px;margin-top:6px;border:2px solid #2b5278;cursor:pointer}
.msg audio{max-width:220px;margin-top:6px;border-radius:15px}
.msg small{font-size:9px;color:#8a9ba8;margin-top:4px;display:flex;gap:8px;align-items:center}
.msg small button{background:none;border:none;color:#8a9ba8;cursor:pointer;font-size:10px;padding:2px 5px;border-radius:5px}
.msg small button:hover{color:#5288c4;background:rgba(82,136,196,.1)}
.deleteBtn{position:absolute;top:-7px;left:-7px;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;color:#fff;border-radius:50%;width:21px;height:21px;font-size:13px;cursor:pointer;display:none;font-weight:bold}
.msg.me:hover.deleteBtn{display:block}
.system{text-align:center;color:#8a9ba8;font-size:11px;margin:10px 0;padding:7px 14px;background:rgba(26,35,50,.8);border-radius:15px;align-self:center;border:1px solid #2b5278}

#inputArea{display:flex;flex-direction:column;background:#1a2332;border-top:2px solid #000}
.replying{display:none;background:rgba(82,136,196,.15);padding:8px 12px;border-right:3px solid #5288c4;font-size:11px;color:#aaa;justify-content:space-between;align-items:center}
.replying b{color:#5288c4}
.replying span{flex:1;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.replying button{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:16px}
.inputRow{display:flex;align-items:center;padding:9px;gap:7px}
#msg{flex:1;padding:11px 15px;border:2px solid #2b5278;background:#0a0e13;color:#fff;border-radius:22px;font-size:13px;transition:.3s}
#msg:focus{border-color:#5288c4;box-shadow:0 0 10px rgba(82,136,196,.3);outline:none}
.actionBtn{padding:11px 13px;border:none;background:linear-gradient(135deg,#2b5278,#1e3a5f);color:#fff;border-radius:50%;cursor:pointer;font-size:18px;min-width:42px;transition:.2s}
.actionBtn:active{transform:scale(.92)}
.actionBtn.recording{background:linear-gradient(135deg,#e74c3c,#c0392b);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.sendBtn{padding:9px 16px;border:none;background:linear-gradient(135deg,#5288c4,#3a6ea5);color:#fff;border-radius:20px;font-weight:bold;cursor:pointer;font-size:12px;transition:.2s}
.sendBtn:active{transform:scale(.95)}
input[type=file]{display:none}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="banner">
    <h1>برنامج دايرة شات</h1>
    <h2>من برمجة وتصميم المهندس سالم حجاج</h2>
    <span class="badge">خاص</span>
  </div>
  <input id="name" placeholder="اكتب الاسم اللي هتظهر بيه">
  <button onclick="join()">دخول الشات الآن</button>
  <div class="footer-text">
    جميع الحقوق محفوظة © 2026<br>
    برنامج مراسلة يخص المهندس سالم حجاج<br>
    غير تابع لأي جهة
  </div>
</div>

<div id="chatScreen">
  <div class="header">
    <button class="exitBtn" onclick="location.reload()">خروج</button>
    <h1>برنامج دايرة شات</h1>
    <p>من برمجة وتصميم المهندس سالم حجاج © 2026</p>
  </div>
  <div id="msgs"></div>
  <div id="inputArea">
    <div class="replying" id="replyBox">
      <b>رد على:</b> <span id="replyText"></span>
      <button onclick="cancelReply()">×</button>
    </div>
    <div class="inputRow">
      <label class="actionBtn" for="img">📷</label>
      <input type="file" id="img" accept="image/*">
      <button class="actionBtn" id="mic" onclick="rec()">🎤</button>
      <input id="msg" placeholder="اكتب رسالتك...">
      <button class="sendBtn" onclick="send()">إرسال</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io(),msgs=document.getElementById('msgs'),name=document.getElementById('name'),msg=document.getElementById('msg'),img=document.getElementById('img'),mic=document.getElementById('mic'),replyBox=document.getElementById('replyBox'),replyText=document.getElementById('replyText');
let myId='',recorder,chunks=[],replyTo=null;

function join(){if(!name.value.trim())return alert('اكتب اسمك الأول');document.getElementById('loginScreen').style.display='none';document.getElementById('chatScreen').style.display='flex';socket.emit('join',name.value.trim());msg.focus()}
function send(){if(msg.value.trim()){socket.emit('chat',{text:msg.value,replyTo:replyTo});msg.value='';cancelReply()}}

function cancelReply(){replyTo=null;replyBox.style.display='none'}

msg.onkeypress=e=>{if(e.key==='Enter')send()}
img.onchange=e=>{const f=e.target.files[0];if(f&&f.size<8*1024*1024){const r=new FileReader();r.onload=()=>socket.emit('chat',{img:r.result,replyTo:replyTo});r.readAsDataURL(f);cancelReply()}e.target.value=''}

async function rec(){
  if(!recorder||recorder.state==='inactive'){
    const stream=await navigator.mediaDevices.getUserMedia({audio:1});
    recorder=new MediaRecorder(stream);
    chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{const r=new FileReader();r.onload=()=>socket.emit('chat',{audio:r.result,replyTo:replyTo});r.readAsDataURL(new Blob(chunks));cancelReply()};
    recorder.start();mic.classList.add('recording');mic.innerText='⏹️'
  }else{recorder.stop();mic.classList.remove('recording');mic.innerText='🎤'}
}

function doReply(id,user,text){
  replyTo=id;
  replyBox.style.display='flex';
  replyText.innerText=user+': '+(text||'صورة/ريكورد');
  msg.focus();
}

function del(id){if(confirm('تمسح الرسالة دي؟'))socket.emit('deleteMsg',id)}

socket.on('connect',()=>myId=socket.id);

let allMsgs={};
function render(d){
  if(d.id==='system')return'<div class="system">'+d.text+'</div>';
  allMsgs[d.msgId]=d;
  const me=d.id===myId;
  const replyHtml=d.replyTo&&allMsgs[d.replyTo]?'<div class="replyBox"><b>'+allMsgs[d.replyTo].user+'</b><br>'+(allMsgs[d.replyTo].text||'صورة/ريكورد')+'</div>':'';
  const btn=me?'<button class="deleteBtn" onclick="del(\''+d.msgId+'\')">×</button>':'';
  const replyBtn='<button onclick="doReply(\''+d.msgId+'\',\''+d.user+'\',`'+(d.text||'').replace(/`/g,'')+'`)">↩️ رد</button>';

  return'<div class="msg '+(me?'me':'other')+'" id="m'+d.msgId+'">'+btn+'<div class="msg-bubble" ondblclick="doReply(\''+d.msgId+'\',\''+d.user+'\',`'+(d.text||'').replace(/`/g,'')+'`)">'+replyHtml+'<b>'+d.user+'</b><br>'+d.text+(d.img?'<br><img src="'+d.img+'" onclick="window.open(this.src)">':'')+(d.audio?'<br><audio controls src="'+d.audio+'"></audio>':'')+'</div><small>'+d.time+replyBtn+'</small></div>'
}

socket.on('chatHistory',h=>{msgs.innerHTML='';allMsgs={};h.forEach(d=>{allMsgs[d.msgId]=d;msgs.innerHTML+=render(d)});msgs.scrollTop=msgs.scrollHeight});
socket.on('chat',d=>{allMsgs[d.msgId]=d;msgs.innerHTML+=render(d);msgs.scrollTop=msgs.scrollHeight});
socket.on('msgDeleted',id=>{const el=document.getElementById('m'+id);if(el)el.remove();delete allMsgs[id]});
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>دايرة - سالم حجاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:tahoma;background:#0e1621;color:#fff;height:100vh;overflow:hidden}

/* واجهة الدخول */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#17212b 0%,#0e1621 100%);padding:20px}
.logo{font-size:42px;font-weight:bold;color:#6ab7ff;margin-bottom:5px;letter-spacing:2px}
#loginScreen h1{font-size:18px;color:#aaa;margin-bottom:25px}
#loginScreen input{width:100%;max-width:300px;padding:12px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:12px;font-size:15px;margin-bottom:12px;text-align:center}
#loginScreen button{width:100%;max-width:300px;padding:12px;border:none;background:#5288c4;color:#fff;border-radius:12px;font-weight:bold;cursor:pointer;font-size:15px}
.disclaimer{font-size:10px;color:#555;margin-top:20px;text-align:center;line-height:1.5}

/* الشات */
#chatScreen{display:none;flex-direction:column;height:100vh}
.header{background:#17212b;padding:12px 15px;text-align:center;border-bottom:1px solid #0e1621;position:relative}
.header h1{font-size:16px;font-weight:bold;color:#6ab7ff}
.header p{font-size:10px;color:#7d8b99;margin-top:2px}
.exitBtn{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:#e74c3c;border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer}

#msgs{flex:1;overflow-y:auto;padding:10px;background:#0e1621;display:flex;flex-direction:column}
.msg{margin:6px 0;display:flex;flex-direction:column;max-width:75%;position:relative}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg div{background:#182533;padding:8px 12px;border-radius:12px;font-size:14px;word-wrap:break-word;line-height:1.4}
.msg.me div{background:#2b5278;border-bottom-right-radius:3px}
.msg.other div{border-bottom-left-radius:3px}
.msg img{max-width:200px;border-radius:8px;margin-top:5px;cursor:pointer}
.msg audio{max-width:220px;margin-top:5px}
.msg small{font-size:10px;color:#7d8b99;margin-top:3px}
.deleteBtn{position:absolute;top:-5px;left:-5px;background:#e74c3c;border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none}
.msg.me:hover.deleteBtn{display:block}
.system{text-align:center;color:#7d8b99;font-size:12px;margin:10px 0}

#inputArea{display:flex;align-items:center;background:#17212b;padding:8px;border-top:1px solid #0e1621;gap:8px}
#msg{flex:1;padding:10px 15px;border:none;outline:none;background:#242f3d;color:#fff;border-radius:20px;font-size:14px}
.imgBtn,.micBtn{padding:10px 12px;border:none;background:#242f3d;color:#fff;border-radius:50%;cursor:pointer;font-size:18px}
.micBtn.recording{background:#e74c3c}
button.send{padding:10px 16px;border:none;background:#5288c4;color:#fff;border-radius:20px;font-weight:bold;cursor:pointer;font-size:14px}
input[type=file]{display:none}
</style>
</head>
<body>

<!-- واجهة الدخول باللوجو -->
<div id="loginScreen">
  <div class="logo">سالم حجاج</div>
  <h1>برنامج مراسلة خاص</h1>
  <input id="name" placeholder="اكتب اسمك">
  <button onclick="joinChat()">دخول</button>
  <div class="disclaimer">
    برنامج مراسلة يخص الباشمهندس سالم حجاج<br>
    غير تابع لأي جهة
  </div>
</div>

<!-- شاشة الشات -->
<div id="chatScreen">
  <div class="header">
    <button class="exitBtn" onclick="exitChat()">خروج</button>
    <h1>دايرة شات</h1>
    <p>برمجة: سالم حجاج © 2026</p>
  </div>

  <div id="msgs">
    <div class="system">نورت الشات 🔥</div>
  </div>

  <div id="inputArea">
    <label class="imgBtn" for="imgInput">📷</label>
    <input type="file" id="imgInput" accept="image/*">
    <button class="micBtn" id="micBtn" onclick="toggleRecord()">🎤</button>
    <input id="msg" placeholder="اكتب رسالة...">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const msgs = document.getElementById('msgs');
const nameInput = document.getElementById('name');
const msgInput = document.getElementById('msg');
const imgInput = document.getElementById('imgInput');
const micBtn = document.getElementById('micBtn');
let myName = '';
let myId = '';
let mediaRecorder, audioChunks = [];

function joinChat(){
  myName = nameInput.value.trim();
  if(!myName) return alert('اكتب اسمك الأول');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  socket.emit('join', myName);
  msgInput.focus();
}

function exitChat(){ location.reload(); }

function send(){
  const m = msgInput.value.trim();
  if(m) {
    socket.emit('chat', {text: m, img: null, audio: null});
    msgInput.value = '';
  }
}

msgInput.addEventListener('keypress', e => { if(e.key==='Enter') send() });

// رفع الصور
imgInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    socket.emit('chat', {text: '', img: event.target.result, audio: null});
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// تسجيل الصوت
async function toggleRecord(){
  if(!mediaRecorder || mediaRecorder.state === 'inactive'){
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, {type: 'audio/ogg'});
      const reader = new FileReader();
      reader.onload = () => socket.emit('chat', {text: '', img: null, audio: reader.result});
      reader.readAsDataURL(audioBlob);
    };
    mediaRecorder.start();
    micBtn.classList.add('recording');
    micBtn.innerText = '⏹️';
  } else {
    mediaRecorder.stop();
    micBtn.classList.remove('recording');
    micBtn.innerText = '🎤';
  }
}

// مسح الرسالة
function deleteMsg(msgId){
  if(confirm('تمسح الرسالة دي؟')){
    socket.emit('deleteMsg', msgId);
  }
}

socket.on('connect', () => { myId = socket.id });

function renderMsg(d){
  if(d.user === 'النظام') {
    return '<div class="system">' + d.user + ': ' + d.text + '</div>';
  } else {
    const isMe = d.id === myId;
    const imgHtml = d.img? '<br><img src="' + d.img + '" onclick="window.open(this.src)">' : '';
    const audioHtml = d.audio? '<br><audio controls src="' + d.audio + '"></audio>' : '';
    const delBtn = isMe? '<button class="deleteBtn" onclick="deleteMsg(' + d.msgId + ')">×</button>' : '';
    return '<div class="msg ' + (isMe? 'me' : 'other') + '" id="msg-' + d.msgId + '">' + delBtn + '<div><b>' + d.user + '</b><br>' + d.text + imgHtml + audioHtml + '</div><small>' + d.time + '</small></div>';
  }
}

socket.on('chatHistory', (history) => {
  history.forEach(d => {
    msgs.innerHTML += renderMsg(d);
  });
  msgs.scrollTop = msgs.scrollHeight;
});

socket.on('chat', d => {
  msgs.innerHTML += renderMsg(d);
  msgs.scrollTop = msgs.scrollHeight;
});

socket.on('msgDeleted', (msgId) => {
  const el = document.getElementById('msg-' + msgId);
  if(el) el.remove();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>دردشة دايرة</title>
<style>
body{font-family:tahoma;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
#chat{width:400px;height:500px;border:1px solid #444;display:flex;flex-direction:column}
#msgs{flex:1;overflow-y:auto;padding:10px}
input,button{padding:10px;border:none}
</style>
</head>
<body>
<div id="chat">
  <div id="msgs"></div>
  <input id="name" placeholder="اكتب اسمك">
  <input id="msg" placeholder="اكتب رسالتك">
  <button onclick="send()">إرسال</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const msgs = document.getElementById('msgs');
let myName = '';

function send(){
  if(!myName) myName = document.getElementById('name').value;
  const m = document.getElementById('msg').value;
  socket.emit('join', myName);
  socket.emit('chat', m);
  document.getElementById('msg').value = '';
}
socket.on('chat', d => {
  msgs.innerHTML += `<div><b>${d.user}:</b> ${d.text}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
});
</script>
</body>
</html>
